name: nodejs
type: interpreted
filename: main.js
default_version: "26"
env:
  PATH: "/usr/local/bin:/usr/bin:/bin"
limits:
  min_memory_mib: 64
  max_memory_mib: 128
  min_timeout_seconds: 1
  max_timeout_seconds: 10
  max_pids: 64
versions:
  "26":
    base_image: node:26-alpine
    run_cmd: ["node", "/sandbox/main.js"]
  "24":
    base_image: node:24-alpine
    run_cmd: ["node", "/sandbox/main.js"]
