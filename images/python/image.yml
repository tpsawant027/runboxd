name: python
type: interpreted
filename: main.py
default_version: "3.14"
limits:
  min_memory_mib: 64
  max_memory_mib: 128
  min_timeout_seconds: 1
  max_timeout_seconds: 10
  max_pids: 64
versions:
  "3.14":
    base_image: python:3.14-slim
    run_cmd: ["python", "/sandbox/main.py"]
  "3.13":
    base_image: python:3.13-slim
    run_cmd: ["python", "/sandbox/main.py"]
  "3.12":
    base_image: python:3.12-slim
    run_cmd: ["python", "/sandbox/main.py"]
