name: python
type: interpreted
filename: main.py
default_version: "3.12"
limits:
  max_memory_mib: 256
  max_pids: 64
versions:
  "3.10":
    base_image: python:3.10-alpine
    run_cmd: ["python3", "/sandbox/main.py"]
  "3.11":
    base_image: python:3.11-alpine
    run_cmd: ["python3", "/sandbox/main.py"]
  "3.12":
    base_image: python:3.12-alpine
    run_cmd: ["python3", "/sandbox/main.py"]
